<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMI MKT — Pipeline</title>
<style>
:root{
  /* conteúdo — tema claro */
  --bg:#edecea;
  --s1:#ffffff;
  --s2:#f4f2ee;
  --s3:#e9e6e0;
  --b:#d8d4cd;
  --t1:#111827;
  --t2:#4b5563;
  --t3:#9ca3af;
  --ac:#c8192b;
  --ac2:#a5141f;
  /* header — zona escura (KAMI identity) */
  --hbg:#1c1c1c;
  --hb:#2e2e2e;
  --ht1:#f0f0f0;
  --ht2:#a0a0a0;
  --ht3:#5e5e5e;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:var(--t3);}

/* HEADER — dark zone */
.header{display:flex;align-items:center;gap:10px;padding:0 20px;background:var(--hbg);border-bottom:1px solid var(--hb);flex-shrink:0;height:50px;}
.brand{font-weight:800;font-size:15px;letter-spacing:-0.5px;white-space:nowrap;color:var(--ht1);display:flex;align-items:center;gap:7px;}
.brand b{color:var(--ac);}
.brand-k{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:#fff;border-radius:6px;font-size:13px;font-weight:900;color:#111;flex-shrink:0;letter-spacing:-1px;}
.sep{width:1px;height:18px;background:var(--hb);}
.pipe-tabs{display:flex;background:rgba(255,255,255,.07);border-radius:8px;padding:2px;gap:1px;}
.pt-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;border:none;background:none;color:var(--ht3);cursor:pointer;font-size:12px;font-weight:700;letter-spacing:.3px;transition:.12s;}
.pt-btn.on{background:var(--ac);color:#fff;}
.pt-btn:not(.on):hover{color:var(--ht1);background:rgba(255,255,255,.08);}
.vtabs{display:flex;background:rgba(255,255,255,.07);border-radius:8px;padding:2px;gap:1px;}
.vbtn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;border:none;background:none;color:var(--ht3);cursor:pointer;font-size:12px;font-weight:600;transition:.12s;}
.vbtn.on{background:rgba(255,255,255,.12);color:var(--ht1);}
.vbtn:not(.on):hover{color:var(--ht1);}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px;}
.btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:.12s;font-family:inherit;}
.btn-p{background:var(--ac);color:#fff;}
.btn-p:hover{background:var(--ac2);}
.btn-o{background:transparent;color:var(--ht2);border:1px solid var(--hb);}
.btn-o:hover{background:rgba(255,255,255,.08);color:var(--ht1);}
.btn-d{background:rgba(220,38,38,.1);color:#dc2626;border:1px solid rgba(220,38,38,.25);margin-right:auto;}
.btn-d:hover{background:#dc2626;color:#fff;}
.user-chip{font-size:12px;color:var(--ht2);padding:4px 10px;background:rgba(255,255,255,.08);border-radius:6px;border:1px solid var(--hb);white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis;}
.btn-icon{background:rgba(255,255,255,.08);border:1px solid var(--hb);color:var(--ht2);width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:.12s;flex-shrink:0;}
.btn-icon:hover{background:var(--ac);color:#fff;border-color:var(--ac);}

/* FILTERS */
.filters{display:flex;gap:6px;align-items:center;padding:7px 20px;background:var(--s1);border-bottom:1px solid var(--b);flex-shrink:0;flex-wrap:wrap;}
.flabel{font-size:10px;color:var(--t3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;}
.fsel,.fsearch{background:var(--s2);border:1px solid var(--b);border-radius:6px;color:var(--t1);padding:5px 9px;font-size:12px;outline:none;font-family:inherit;transition:border-color .12s;}
.fsel:focus,.fsearch:focus{border-color:var(--ac);}
.fsearch{width:170px;}
.fsearch::placeholder{color:var(--t3);}
.fsel option{background:var(--s1);}
.fclr{font-size:11px;color:var(--ac);cursor:pointer;padding:4px 7px;border-radius:5px;transition:.12s;}
.fclr:hover{background:rgba(200,25,43,.08);}

/* STATS */
.stats{display:flex;gap:18px;padding:5px 20px;background:var(--s1);border-bottom:1px solid var(--b);flex-shrink:0;}
.stat{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);}
.stat strong{color:var(--t1);font-weight:700;}
.sdot{width:6px;height:6px;border-radius:50%;}

/* MAIN */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* KANBAN */
.kanban{display:flex;gap:10px;padding:14px 20px 20px;overflow-x:auto;overflow-y:hidden;flex:1;align-items:flex-start;}
.kcol{flex-shrink:0;width:248px;background:var(--s2);border:1px solid var(--b);border-radius:12px;display:flex;flex-direction:column;max-height:100%;}
.khead{display:flex;align-items:center;gap:7px;padding:10px 12px;border-bottom:1px solid var(--b);flex-shrink:0;}
.kdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ktitle{font-size:11px;font-weight:700;letter-spacing:.3px;flex:1;color:var(--t2);}
.kcount{background:var(--s3);border-radius:20px;padding:1px 7px;font-size:10px;color:var(--t3);font-weight:700;}
.kadd{background:none;border:none;color:var(--t3);cursor:pointer;width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:17px;line-height:1;transition:.12s;flex-shrink:0;}
.kadd:hover{background:var(--ac);color:#fff;}
.kcards{padding:7px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:5px;min-height:60px;}
.kcards.dover{background:rgba(200,25,43,.05);border-radius:8px;}
.kempty{display:flex;flex-direction:column;align-items:center;padding:18px 8px;gap:4px;opacity:.4;}
.kempty-icon{font-size:18px;}
.kempty-txt{font-size:10px;color:var(--t3);text-align:center;}

/* CARD */
.card{background:var(--s1);border:1px solid var(--b);border-left:3px solid var(--b);border-radius:8px;padding:10px 11px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;}
.card:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.10);border-left-color:var(--ac);}
.card.dragging{opacity:.35;}
.ctitle{font-size:12px;font-weight:600;line-height:1.4;margin-bottom:7px;color:var(--t1);}
.ctags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px;}
.tag{padding:2px 6px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.2px;}
.t-p{background:#ede9fe;color:#6d28d9;}
.t-r{background:#fce7f3;color:#be185d;}
.t-c{background:#cffafe;color:#0e7490;}
.t-s{background:#e0e7ff;color:#4338ca;}
.t-v{background:#fef3c7;color:#b45309;}
.t-st{background:#f3e8ff;color:#7e22ce;}
.t-top{background:#dcfce7;color:#166534;}
.t-mid{background:#fef9c3;color:#a16207;}
.t-bot{background:#fee2e2;color:#dc2626;}
/* request tags */
.t-bu{background:#ede9fe;color:#5b21b6;}
.t-ot{background:#e0f2fe;color:#0369a1;}
.t-via-w{background:#dcfce7;color:#15803d;}
.t-via-e{background:#e0e7ff;color:#3730a3;}
.cdates{display:flex;gap:8px;font-size:10px;color:var(--t3);margin-bottom:7px;}
.cdate{display:flex;align-items:center;gap:3px;}
.cinds{display:flex;gap:4px;align-items:center;}
.ind{width:7px;height:7px;border-radius:50%;}
.ind-on{background:#16a34a;opacity:.9;}
.ind-off{background:#d1d5db;}
.ind-blue{background:#3b82f6;opacity:.9;}
.ind-label{font-size:9px;color:var(--t3);margin-left:2px;}
/* avatars */
.avatars{display:flex;gap:3px;margin-top:7px;}
.avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;border:2px solid var(--s1);flex-shrink:0;}
/* request card extras */
.cname{font-size:10px;color:var(--t3);margin-top:6px;display:flex;align-items:center;gap:4px;}
.cclip{font-size:10px;color:#3b82f6;margin-top:4px;}

/* LIST */
.listwrap{flex:1;overflow:auto;padding:14px 20px;}
.ltbl{width:100%;border-collapse:collapse;font-size:12px;}
.ltbl th{padding:7px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.5px;text-transform:uppercase;background:var(--s1);border-bottom:1px solid var(--b);position:sticky;top:0;cursor:pointer;user-select:none;white-space:nowrap;}
.ltbl th:hover{color:var(--t1);}
.ltbl td{padding:9px 12px;border-bottom:1px solid var(--b);vertical-align:middle;}
.ltbl tr:hover td{background:var(--s2);cursor:pointer;}
.sbadge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;}
.sa{display:inline-block;margin-left:3px;opacity:.5;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.overlay.hide{display:none!important;}
.modal{background:var(--s1);border:1px solid var(--b);border-radius:14px;width:100%;max-width:700px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--b);flex-shrink:0;}
.mhead-t{font-size:14px;font-weight:700;color:var(--t1);}
.mclose{width:26px;height:26px;border-radius:6px;border:none;background:var(--s2);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.12s;}
.mclose:hover{background:#ef4444;color:#fff;}
.mtabs{display:flex;padding:0 18px;border-bottom:1px solid var(--b);flex-shrink:0;background:var(--s2);}
.mtab{padding:9px 14px;border:none;background:none;color:var(--t3);cursor:pointer;font-size:12px;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.12s;font-family:inherit;}
.mtab.on{color:var(--ac);border-bottom-color:var(--ac);}
.mtab:not(.on):hover{color:var(--t1);}
.mbody{overflow-y:auto;flex:1;padding:16px 18px;background:var(--s1);}
.tpane{display:none;flex-direction:column;gap:12px;}
.tpane.on{display:flex;}
.mfoot{padding:12px 18px;border-top:1px solid var(--b);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;background:var(--s2);}
/* btn-o dentro de modal usa cores claras */
.modal .btn-o{background:var(--s1);color:var(--t2);border:1px solid var(--b);}
.modal .btn-o:hover{background:var(--s2);color:var(--t1);}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.4px;text-transform:uppercase;}
.fg input,.fg select,.fg textarea{background:var(--s2);border:1px solid var(--b);border-radius:7px;color:var(--t1);padding:8px 11px;font-size:12px;outline:none;font-family:inherit;width:100%;transition:border-color .12s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--ac);}
.fg textarea{resize:vertical;min-height:95px;line-height:1.55;}
.fg select option{background:var(--s1);}
.fg input[type=file]{padding:6px 10px;cursor:pointer;}
.fg .req{color:#dc2626;margin-left:2px;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
/* checkbox group */
.cbgroup{display:flex;flex-direction:column;gap:6px;background:var(--s2);border:1px solid var(--b);border-radius:7px;padding:10px 12px;}
.cbitem{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.cbitem input[type=checkbox]{accent-color:var(--ac);width:14px;height:14px;cursor:pointer;flex-shrink:0;}
.cbitem-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0;}
.cbitem-name{font-size:12px;color:var(--t1);}
/* detail view inside modal */
.detail-section{display:flex;flex-direction:column;gap:10px;}
.detail-row{display:flex;flex-direction:column;gap:3px;}
.detail-label{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.4px;text-transform:uppercase;}
.detail-val{font-size:13px;color:var(--t1);background:var(--s2);border:1px solid var(--b);border-radius:7px;padding:8px 11px;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
.detail-val.mono{font-family:monospace;font-size:12px;}
.detail-val a{color:var(--ac);text-decoration:none;}
.detail-val a:hover{text-decoration:underline;}
/* DASHBOARD */
.dash-wrap{flex:1;overflow-y:auto;padding:20px;}
.dash-grid{display:grid;gap:14px;margin-bottom:16px;}
.dash-card{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.dash-card-title{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.dash-section-label{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--b);}
.kpi-num{font-size:30px;font-weight:800;line-height:1;}
.kpi-sub{font-size:11px;color:var(--t3);margin-top:4px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-row:last-child{margin-bottom:0;}
.bar-label{font-size:11px;color:var(--t2);width:130px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;height:6px;background:var(--b);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}
.bar-val{font-size:11px;color:var(--t3);width:22px;text-align:right;flex-shrink:0;font-weight:700;}
.resp-tbl{width:100%;border-collapse:collapse;}
.resp-tbl th{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.4px;text-transform:uppercase;padding:6px 10px;text-align:center;border-bottom:1px solid var(--b);}
.resp-tbl th:first-child{text-align:left;}
.resp-tbl td{padding:9px 10px;text-align:center;border-bottom:1px solid var(--b);font-size:12px;}
.resp-tbl td:first-child{text-align:left;}
.resp-tbl tr:last-child td{border-bottom:none;}
.cell-badge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700;}
.cell-af{background:#e0e7ff;color:#4338ca;}
.cell-prog{background:#fef3c7;color:#b45309;}
.cell-rev{background:#cffafe;color:#0e7490;}
.cell-done{background:#dcfce7;color:#166534;}
.cell-tot{background:#fee2e2;color:#dc2626;font-size:12px;}
.dash-empty{color:var(--t3);font-size:12px;text-align:center;padding:24px 0;}
.ch-group{display:flex;flex-wrap:wrap;gap:5px;background:var(--s2);border:1px solid var(--b);border-radius:7px;padding:8px 10px;}
.ch-item{display:flex;align-items:center;gap:4px;cursor:pointer;padding:3px 7px;border-radius:5px;transition:.1s;user-select:none;}
.ch-item:hover{background:var(--s3);}
.ch-item input[type=checkbox]{accent-color:var(--ac);width:12px;height:12px;cursor:pointer;flex-shrink:0;}
.ch-item-name{font-size:11px;color:var(--t2);}
.t-ch{background:#ccfbf1;color:#0f766e;}
/* AVATAR */
.u-av-btn{background:none;border:none;padding:0;cursor:pointer;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.u-av-btn:hover::after{content:'✎';position:absolute;inset:0;background:rgba(0,0,0,.45);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;pointer-events:none;}
.u-av-btn img,.u-av-btn div{pointer-events:none;}
/* AI MODAL */
.ai-spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(0,0,0,.12);border-top-color:var(--ac);border-radius:50%;animation:ai-spin .6s linear infinite;vertical-align:middle;margin-right:4px;}
@keyframes ai-spin{to{transform:rotate(360deg)}}
.ai-preview-item{background:var(--s2);border:1px solid var(--b);border-radius:7px;padding:8px 12px;display:flex;align-items:center;gap:8px;}
/* LOGIN */
.login-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;}
.login-card{background:var(--s1);border:1px solid var(--b);border-radius:16px;padding:36px 40px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:14px;box-shadow:0 8px 32px rgba(0,0,0,.10);}
.login-brand{font-size:22px;font-weight:800;letter-spacing:-0.5px;text-align:center;color:var(--t1);display:flex;align-items:center;justify-content:center;gap:9px;}
.login-brand b{color:var(--ac);}
.login-brand-k{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;background:var(--hbg);border-radius:8px;font-size:15px;font-weight:900;color:#fff;flex-shrink:0;}
.login-sub{font-size:11px;color:var(--t3);text-align:center;letter-spacing:.5px;text-transform:uppercase;margin-top:-6px;margin-bottom:4px;}
.login-err{font-size:12px;color:#dc2626;background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.2);border-radius:7px;padding:8px 12px;text-align:center;}
.login-err.hide{display:none;}
/* USERS MODAL */
.utbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:18px;}
.utbl th{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.4px;text-transform:uppercase;padding:6px 10px;text-align:left;border-bottom:1px solid var(--b);}
.utbl td{padding:9px 10px;border-bottom:1px solid var(--b);vertical-align:middle;}
.utbl tr:last-child td{border-bottom:none;}
.role-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;}
.role-admin{background:#fee2e2;color:#dc2626;}
.role-user{background:#e0e7ff;color:#4338ca;}
.add-user-form{background:var(--s2);border:1px solid var(--b);border-radius:10px;padding:14px;}
.add-user-form .form-title{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:12px;}
/* POST FORMAT TAGS */
.t-fmt-feed{background:#e0f2fe;color:#0369a1;}
.t-fmt-reels{background:#fce7f3;color:#be185d;}
.t-fmt-stories{background:#f3e8ff;color:#7e22ce;}
.t-fmt-youtube{background:#fee2e2;color:#dc2626;}
.t-fmt-tiktok{background:#f1f1f1;color:#111;}
.t-fmt-linkedin{background:#e0e7ff;color:#0077b5;}
/* FORMAT PILL SELECTOR */
.fmt-pill{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:6px;border:1.5px solid var(--b);background:var(--s2);cursor:pointer;user-select:none;font-size:11px;font-weight:600;color:var(--t2);transition:.1s;}
.fmt-pill:hover{border-color:var(--ac);color:var(--ac);}
.fmt-pill.active{border-color:var(--ac);background:rgba(200,25,43,.08);color:var(--ac);}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════
// PIPELINE 1 — CONTEÚDO
// ═══════════════════════════════════════
const ST = [
  {id:'ideas',        label:'Banco de ideias',        color:'#6366f1'},
  {id:'social-todo',  label:'A Fazer Social Media',   color:'#8b5cf6'},
  {id:'av-todo',      label:'A Fazer Audiovisual',    color:'#ec4899'},
  {id:'cri-todo',     label:'A Fazer Criativo',       color:'#f43f5e'},
  {id:'progress',     label:'Em Andamento',           color:'#f59e0b'},
  {id:'review',       label:'Revisão | Aprovação',    color:'#06b6d4'},
  {id:'final-social', label:'Finalizar Social Media', color:'#3b82f6'},
  {id:'done',         label:'Concluído',              color:'#22c55e'},
  {id:'standby',      label:'Stand by',               color:'#6b7280'},
];
const PROJ = ['958','Balens','Cadiveu PT','KAMI CO. BR','KAMI CO. Holding','KAMI CO. PT','Pur Hair PT','The Smooth Edit','Toctus_KAMI CO.'];

async function fbGet(path){
  const r=await fetch(`${FB_URL}/${path}.json?auth=${FB_TOKEN}`);
  if(!r.ok)throw new Error(`Firebase ${r.status}`);
  return r.json();
}
function fbSet(path,data){
  // fire-and-forget
  fetch(`${FB_URL}/${path}.json?auth=${FB_TOKEN}`,{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data),
  }).catch(e=>console.error('Firebase save error:',e));
}

function uavatar(u, size=28){
  const initials=(u.name||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'?';
  const palette=['#ec4899','#7c6af6','#06b6d4','#f59e0b','#22c55e','#e73a57','#3b82f6'];
  const ci=Math.abs((u.id||'x').split('').reduce((a,c)=>a+c.charCodeAt(0),0))%palette.length;
  const s=`width:${size}px;height:${size}px;border-radius:50%;flex-shrink:0;`;
  if(u.avatar)return`<img src="${u.avatar}" style="${s}object-fit:cover;display:block;" alt="${esc(initials)}">`;
  return`<div style="${s}background:${palette[ci]};display:flex;align-items:center;justify-content:center;font-size:${Math.floor(size*.38)}px;font-weight:800;color:#fff;letter-spacing:-.5px;">${initials}</div>`;
}

async function callClaude(text, apiKey){
  const resp = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'content-type':'application/json',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body:JSON.stringify({
      model:'claude-opus-4-7',
      max_tokens:8192,
      system:AI_SYSTEM,
      messages:[{role:'user',content:text}],
    }),
  });
  if(!resp.ok){
    let msg=`Erro ${resp.status}`;
    try{const e=await resp.json();msg=e.error?.message||msg;}catch(e2){}
    throw new Error(msg);
  }
  const data=await resp.json();
  const raw=data.content[0].text.trim().replace(/^```(?:json)?\n?/,'').replace(/\n?```$/,'').trim();
  return JSON.parse(raw);
}

function hashPwd(pwd){
  let h=5381;
  for(let i=0;i<pwd.length;i++)h=((h<<5)+h)^pwd.charCodeAt(i);
  return'k'+(h>>>0).toString(16);
}
async function loadUsers(){
  try{
    if(FB_URL){const d=await fbGet('users');if(Array.isArray(d)&&d.length){AUTH.users=d;return;}}
    else{const r=localStorage.getItem(KEY_USERS);if(r){AUTH.users=JSON.parse(r);return;}}
  }catch(e){console.error('loadUsers:',e);}
  if(!AUTH.users.length){
    AUTH.users=[{id:'admin-default',email:'admin@marketing.com',name:'Administrador',role:'admin',pwd:hashPwd('Admin@123'),avatar:''}];
    saveUsers();
  }
}
function saveUsers(){
  if(FB_URL)fbSet('users',AUTH.users);
  else localStorage.setItem(KEY_USERS,JSON.stringify(AUTH.users));
}
function loadSession(){
  try{
    const r=localStorage.getItem(KEY_SESSION);
    if(r){const s=JSON.parse(r);const u=AUTH.users.find(x=>x.id===s.id);if(u){AUTH.session=s;AUTH.showLogin=false;return;}}
  }catch(e){}
  AUTH.showLogin=true;
}
function saveSession(remember){
  const data=JSON.stringify(AUTH.session);
  if(remember){localStorage.setItem(KEY_SESSION,data);sessionStorage.removeItem(KEY_SESSION);}
  else{sessionStorage.setItem(KEY_SESSION,data);localStorage.removeItem(KEY_SESSION);}
}
function clearSession(){
  AUTH.session=null;AUTH.showLogin=true;
  localStorage.removeItem(KEY_SESSION);sessionStorage.removeItem(KEY_SESSION);
}
function loadSession(){
  try{
    const r=localStorage.getItem(KEY_SESSION)||sessionStorage.getItem(KEY_SESSION);
    if(r){const s=JSON.parse(r);const u=AUTH.users.find(x=>x.id===s.id);if(u){AUTH.session=s;AUTH.showLogin=false;return;}}
  }catch(e){}
  AUTH.showLogin=true;
}
function doLogin(email,pwd,remember){
  const u=AUTH.users.find(x=>x.email.toLowerCase()===email.toLowerCase()&&x.pwd===hashPwd(pwd));
  if(!u){AUTH.loginError='E-mail ou senha incorretos.';return false;}
  AUTH.session={id:u.id,email:u.email,name:u.name,role:u.role};
  AUTH.showLogin=false;AUTH.loginError='';
  saveSession(remember);return true;
}
function doLogout(){clearSession();render();}

    e.preventDefault();
    const email=form.querySelector('[name="email"]').value;
    const pwd=form.querySelector('[name="pwd"]').value;
    const remember=form.querySelector('[name="remember"]').checked;
    if(!doLogin(email,pwd,remember)){

      if(errEl){errEl.textContent=AUTH.loginError;errEl.classList.remove('hide');}

function kban1(){
  const cards=filtered1();
  return`<div class="kanban">${ST.map(s=>{
    const cc=cards.filter(c=>c.status===s.id);
    return`<div class="kcol">
      <div class="khead">
        <div class="kdot" style="background:${s.color}"></div>
        <div class="ktitle">${esc(s.label)}</div>

      </div>

        ${cc.length===0?`<div class="kempty"><div class="kempty-icon">○</div><div class="kempty-txt">Vazio</div></div>`:cc.map(c=>card1(c)).join('')}
      </div>
    </div>`;
  }).join('')}</div>`;
}
function card1(c){
  const hs=!!c.script?.trim(),hb=!!c.briefing?.trim(),hc=!!c.caption?.trim(),hl=!!c.fileLink?.trim();
  const proj=c.project?c.project.replace('KAMI CO. ','').replace('Toctus_KAMI CO.','Toctus'):c.project;
  return`<div class="card" draggable="true" data-cid="${c.id}" data-cpipe="1">
    <div class="ctitle">${esc(c.title)||'<em style="color:var(--t3)">Sem título</em>'}</div>
    <div class="ctags">
      ${c.project?`<span class="tag t-p">${esc(proj)}</span>`:''}
      ${c.postFormat?`<span class="tag ${fmtcls(c.postFormat)}">${gfmt(c.postFormat)?.icon||''} ${c.postSubtype||gfmt(c.postFormat)?.label||c.postFormat}</span>`:c.contentType?`<span class="tag ${tcls(c.contentType)}">${esc(c.contentType)}</span>`:''}
      ${c.funnel?`<span class="tag ${fcls(c.funnel)}">${esc(c.funnel)}</span>`:''}
      ${(c.channel&&c.channel.length)?c.channel.map(ch=>`<span class="tag t-ch">${esc(ch)}</span>`).join(''):''}
    </div>
    ${(c.deliveryDate||c.publishDate)?`<div class="cdates">
      ${c.deliveryDate?`<div class="cdate">📦 ${fdate(c.deliveryDate)}</div>`:''}
      ${c.publishDate?`<div class="cdate">📅 ${fdate(c.publishDate)}</div>`:''}
    </div>`:''}
    <div class="cinds">
      <div class="ind ${hs?'ind-on':'ind-off'}" title="Roteiro ${hs?'✓':'vazio'}"></div>
      <div class="ind ${hb?'ind-on':'ind-off'}" title="Briefing ${hb?'✓':'vazio'}"></div>
      <div class="ind ${hc?'ind-on':'ind-off'}" title="Legenda ${hc?'✓':'vazia'}"></div>
      ${hl?`<div class="ind ind-blue" title="Arquivo vinculado"></div>`:''}
      <span class="ind-label">R B L${hl?' A':''}</span>
    </div>
    ${(c.responsible&&c.responsible.length)?`<div class="avatars">${c.responsible.map(n=>{const m=getTeam().find(t=>t.name===n);return m?`<div class="avatar" style="background:${m.color}" title="${esc(n)}">${m.initials}</div>`:''}).join('')}</div>`:''}
  </div>`;
}

// ── PIPELINE 1: LIST ────────────────────
function list1(){
  const cards=filtered1();const s=S.sort;
  const sorted=[...cards].sort((a,b)=>{
    let av=a[s.field]||'',bv=b[s.field]||'';
    if(s.field==='createdAt'){av=Number(av);bv=Number(bv);}
    if(av<bv)return s.dir==='asc'?-1:1;if(av>bv)return s.dir==='asc'?1:-1;return 0;
  });
  const arr=f=>s.field===f?`<span class="sa">${s.dir==='asc'?'▲':'▼'}</span>`:'';
  return`<div class="listwrap"><table class="ltbl">
    <thead><tr>
      <th data-sort1="title">Título${arr('title')}</th>
      <th data-sort1="status">Status${arr('status')}</th>
      <th data-sort1="project">Projeto${arr('project')}</th>
      <th data-sort1="contentType">Tipo${arr('contentType')}</th>
      <th data-sort1="funnel">Funil${arr('funnel')}</th>
      <th data-sort1="deliveryDate">Entrega Criativo${arr('deliveryDate')}</th>
      <th data-sort1="publishDate">Publicação${arr('publishDate')}</th>
      <th>Canal</th>
      <th>Responsáveis</th>
      <th>Conteúdo</th>
    </tr></thead>
    <tbody>${sorted.length===0?`<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--t3);">Nenhum card encontrado</td></tr>`:sorted.map(c=>{
      const st=gst(c.status);
      const hs=!!c.script?.trim(),hb=!!c.briefing?.trim(),hc=!!c.caption?.trim(),hl=!!c.fileLink?.trim();
      return`<tr data-cid="${c.id}" data-cpipe="1">
        <td style="font-weight:600;max-width:200px;"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.title)||'—'}</div></td>
        <td><span class="sbadge" style="background:${st.color}22;color:${st.color}">${esc(st.label)}</span></td>
        <td>${c.project?`<span class="tag t-p" style="white-space:nowrap">${esc(c.project)}</span>`:'—'}</td>
        <td>${c.postFormat?`<span class="tag ${fmtcls(c.postFormat)}">${gfmt(c.postFormat)?.icon||''} ${c.postSubtype||gfmt(c.postFormat)?.label||c.postFormat}</span>`:c.contentType?`<span class="tag ${tcls(c.contentType)}">${esc(c.contentType)}</span>`:'—'}</td>
        <td>${c.funnel?`<span class="tag ${fcls(c.funnel)}">${esc(c.funnel)}</span>`:'—'}</td>
        <td style="color:var(--t2)">${fdate(c.deliveryDate)}</td>
        <td style="color:var(--t2)">${fdate(c.publishDate)}</td>
        <td><div style="display:flex;flex-wrap:wrap;gap:3px;">${(c.channel&&c.channel.length)?c.channel.map(ch=>`<span class="tag t-ch">${esc(ch)}</span>`).join(''):'<span style="color:var(--t3)">—</span>'}</div></td>
        <td><div style="display:flex;gap:3px;">${(c.responsible&&c.responsible.length)?c.responsible.map(n=>{const m=getTeam().find(t=>t.name===n);return m?`<div class="avatar" style="background:${m.color};width:22px;height:22px;font-size:9px;" title="${esc(n)}">${m.initials}</div>`:''}).join(''):'<span style="color:var(--t3)">—</span>'}</div></td>
        <td><div style="display:flex;gap:4px;">
          <div class="ind ${hs?'ind-on':'ind-off'}" title="Roteiro"></div>
          <div class="ind ${hb?'ind-on':'ind-off'}" title="Briefing"></div>
          <div class="ind ${hc?'ind-on':'ind-off'}" title="Legenda"></div>
          ${hl?`<div class="ind ind-blue" title="Arquivo"></div>`:''}
        </div></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function dashboard(){
  const c1=S.cards;
  const c2=S.requests;
  const AF=['ideas','social-todo','av-todo','cri-todo'];

  // P1 totals
  const af1=c1.filter(c=>AF.includes(c.status)).length;
  const prog1=c1.filter(c=>c.status==='progress').length;
  const rev1=c1.filter(c=>['review','final-social'].includes(c.status)).length;
  const done1=c1.filter(c=>c.status==='done').length;

  // P2 totals
  const prog2=c2.filter(r=>r.status==='progress').length;
  const done2=c2.filter(r=>r.status==='done').length;
  const wait2=c2.filter(r=>r.status==='waiting').length;

  // Por responsável
  const byResp=getTeam().map(m=>{
    const mc=c1.filter(c=>c.responsible&&c.responsible.includes(m.name));
    return{...m,
      af:mc.filter(c=>AF.includes(c.status)).length,
      prog:mc.filter(c=>c.status==='progress').length,
      rev:mc.filter(c=>['review','final-social'].includes(c.status)).length,
      done:mc.filter(c=>c.status==='done').length,
      total:mc.length};
  });
  const semResp=c1.filter(c=>!c.responsible||!c.responsible.length);

  // Por projeto
  const byProj=PROJ.map(p=>({label:p.replace('KAMI CO. ','').replace('Toctus_KAMI CO.','Toctus'),count:c1.filter(c=>c.project===p).length}))
    .filter(x=>x.count>0).sort((a,b)=>b.count-a.count);
  const maxProj=Math.max(...byProj.map(x=>x.count),1);

  // Por tipo de conteúdo
  const byCt=CTYPES.map(t=>({label:t,count:c1.filter(c=>c.contentType===t).length}))
    .filter(x=>x.count>0).sort((a,b)=>b.count-a.count);
  const maxCt=Math.max(...byCt.map(x=>x.count),1);

  // P2: por status
  const bySt2=ST2.map(s=>({label:s.label,color:s.color,count:c2.filter(r=>r.status===s.id).length}))
    .filter(x=>x.count>0).sort((a,b)=>b.count-a.count);
  const maxSt2=Math.max(...bySt2.map(x=>x.count),1);

  // P2: por unidade
  const byUnit=BIZ_UNITS.map(u=>({label:u,count:c2.filter(r=>r.bizUnit===u).length}))
    .filter(x=>x.count>0).sort((a,b)=>b.count-a.count);
  const maxUnit=Math.max(...byUnit.map(x=>x.count),1);

  // P2: por tipo de pedido
  const byOT=ORDER_TYPES.map(t=>({
    label:t.replace('Lâminas comerciais — campanhas ou promoções','Lâminas comerciais'),
    count:c2.filter(r=>r.orderType===t).length
  })).filter(x=>x.count>0).sort((a,b)=>b.count-a.count);
  const maxOT=Math.max(...byOT.map(x=>x.count),1);

  // P2: por setor
  const bySetor=SECTORS.map(s=>({label:s,count:c2.filter(r=>r.setor===s).length}))
    .filter(x=>x.count>0).sort((a,b)=>b.count-a.count);
  const maxSetor=Math.max(...bySetor.map(x=>x.count),1);

  const cell=(n,cls)=>n?`<span class="cell-badge ${cls}">${n}</span>`:`<span style="color:var(--t3)">—</span>`;

  return`<div class="dash-wrap">

    <!-- KPIs -->
    <div class="dash-grid" style="grid-template-columns:repeat(4,1fr)">
      ${kpi('Pipeline Conteúdo',c1.length,'cards cadastrados','#e73a57')}
      ${kpi('Solicitações',c2.length,'solicitações recebidas','#8b5cf6')}
      ${kpi('Em Andamento',prog1+prog2,'conteúdo + solicitações','#f59e0b')}
      ${kpi('Concluídos',done1+done2,'conteúdo + solicitações','#22c55e')}
    </div>

    <!-- Status pipeline 1 -->
    <div class="dash-grid" style="grid-template-columns:repeat(4,1fr)">
      ${kpi('A Fazer',af1,'backlog de conteúdo','#6366f1')}
      ${kpi('Em Andamento',prog1,'conteúdo em produção','#f59e0b')}
      ${kpi('Em Revisão',rev1,'aguardando aprovação','#06b6d4')}
      ${kpi('Concluído',done1,'conteúdos entregues','#22c55e')}
    </div>

    <!-- Por Responsável -->
    <div class="dash-card" style="margin-bottom:14px">
      <div class="dash-card-title">Por Responsável — Pipeline Conteúdo</div>
      <table class="resp-tbl">
        <thead><tr>
          <th>Responsável</th><th>A Fazer</th><th>Em Andamento</th><th>Em Revisão</th><th>Concluído</th><th>Total</th>
        </tr></thead>
        <tbody>
          ${byResp.map(m=>`<tr>
            <td><div style="display:flex;align-items:center;gap:7px;">
              <div class="avatar" style="background:${m.color};width:22px;height:22px;font-size:9px;border:none">${m.initials}</div>
              <span>${esc(m.name)}</span>
            </div></td>
            <td>${cell(m.af,'cell-af')}</td>
            <td>${cell(m.prog,'cell-prog')}</td>
            <td>${cell(m.rev,'cell-rev')}</td>
            <td>${cell(m.done,'cell-done')}</td>
            <td><span class="cell-badge cell-tot">${m.total}</span></td>
          </tr>`).join('')}
          ${semResp.length?`<tr>
            <td style="color:var(--t3);font-size:11px">Sem responsável</td>
            <td>${cell(semResp.filter(c=>AF.includes(c.status)).length,'cell-af')}</td>
            <td>${cell(semResp.filter(c=>c.status==='progress').length,'cell-prog')}</td>
            <td>${cell(semResp.filter(c=>['review','final-social'].includes(c.status)).length,'cell-rev')}</td>
            <td>${cell(semResp.filter(c=>c.status==='done').length,'cell-done')}</td>
            <td><span class="cell-badge cell-tot">${semResp.length}</span></td>
          </tr>`:''}
        </tbody>
      </table>
    </div>

    <!-- Por Projeto + Tipo de Conteúdo -->
    <div class="dash-grid" style="grid-template-columns:1fr 1fr">
      <div class="dash-card">
        <div class="dash-card-title">Por Projeto</div>
        ${barRows(byProj,maxProj,'#e73a57')}
      </div>
      <div class="dash-card">
        <div class="dash-card-title">Por Tipo de Conteúdo</div>
        ${barRows(byCt,maxCt,'#8b5cf6')}
      </div>
    </div>

    <!-- Divider Solicitações -->
    <div style="margin:20px 0 14px;display:flex;align-items:center;gap:10px;">
      <div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.6px;text-transform:uppercase;white-space:nowrap">Pipeline Solicitações</div>
      <div style="flex:1;height:1px;background:var(--b)"></div>
    </div>

    <!-- P2 KPIs -->
    <div class="dash-grid" style="grid-template-columns:repeat(4,1fr)">
      ${kpi('Novas | Triagem',c2.filter(r=>r.status==='triage').length,'aguardando análise','#6366f1')}
      ${kpi('Em Andamento',prog2,'em produção criativa','#f59e0b')}
      ${kpi('Aguardando Info',wait2,'pendentes de retorno','#f43f5e')}
      ${kpi('Concluídas',done2,'solicitações entregues','#22c55e')}
    </div>

    <!-- P2 charts -->
    <div class="dash-grid" style="grid-template-columns:1fr 1fr 1fr">
      <div class="dash-card">
        <div class="dash-card-title">Por Status</div>
        ${bySt2.length?bySt2.map(x=>`<div class="bar-row">
          <div class="bar-label" title="${esc(x.label)}">${esc(x.label)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(x.count/maxSt2*100)}%;background:${x.color}"></div></div>
          <div class="bar-val">${x.count}</div>
        </div>`).join(''):`<div class="dash-empty">Sem dados</div>`}
      </div>
      <div class="dash-card">
        <div class="dash-card-title">Por Unidade de Negócio</div>
        ${barRows(byUnit,maxUnit,'#06b6d4')}
      </div>
      <div class="dash-card">
        <div class="dash-card-title">Por Tipo de Pedido</div>
        ${barRows(byOT,maxOT,'#f59e0b')}
      </div>
    </div>

    <!-- P2 setor -->
    <div class="dash-grid" style="grid-template-columns:1fr">
      <div class="dash-card">
        <div class="dash-card-title">Por Setor Solicitante</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 24px">
          ${barRows(bySetor,maxSetor,'#e73a57')}
        </div>
      </div>
    </div>

  </div>`;
}

function socCalendar(){
  const now=new Date();
  const ym=S.social_cal_date||{year:now.getFullYear(),month:now.getMonth()};
  const y=ym.year,m=ym.month;
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const months=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const days=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const todayStr=new Date().toISOString().slice(0,10);
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  function postsForDay(d){const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;return S.social_posts.filter(p=>p.scheduledAt&&p.scheduledAt.startsWith(ds));}
  const monthPosts=S.social_posts.filter(p=>p.scheduledAt&&p.scheduledAt.startsWith(`${y}-${String(m+1).padStart(2,'0')}`));
  return`<div style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
    <div style="padding:10px 20px;background:var(--s1);border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px;flex-shrink:0;">
      <button data-action="soc-cal-prev" style="background:var(--s2);border:1px solid var(--b);border-radius:7px;color:var(--t2);width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;">‹</button>
      <div style="font-size:13px;font-weight:700;color:var(--t1);min-width:150px;text-align:center;">${months[m]} ${y}</div>
      <button data-action="soc-cal-next" style="background:var(--s2);border:1px solid var(--b);border-radius:7px;color:var(--t2);width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;">›</button>
      <button data-action="soc-cal-today" style="background:var(--s2);border:1px solid var(--b);border-radius:7px;color:var(--t2);padding:5px 11px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;">Hoje</button>
      <div style="margin-left:auto;font-size:11px;color:var(--t3);">${monthPosts.length} post${monthPosts.length!==1?'s':''} em ${months[m]}</div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:14px 20px;">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--b);border-radius:10px;overflow:hidden;border:1px solid var(--b);">
        ${days.map(d=>`<div style="background:var(--s2);padding:7px;text-align:center;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.4px;text-transform:uppercase;">${d}</div>`).join('')}
        ${cells.map(d=>{
          if(!d)return`<div style="background:var(--s1);min-height:78px;"></div>`;
          const posts=postsForDay(d);
          const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const isToday=ds===todayStr;
          return`<div style="background:var(--s1);min-height:78px;padding:5px;box-sizing:border-box;">
            <div style="font-size:11px;font-weight:${isToday?'800':'500'};width:20px;height:20px;border-radius:50%;background:${isToday?'var(--ac)':'transparent'};color:${isToday?'#fff':'var(--t2)'};display:flex;align-items:center;justify-content:center;margin-bottom:3px;">${d}</div>
            ${posts.slice(0,3).map(p=>{const ch=(p.channels||[])[0];const pl=ch?gplat(ch):null;return`<div style="background:${pl?pl.color+'18':'var(--s2)'};border-left:2px solid ${pl?pl.color:'var(--b)'};border-radius:3px;padding:2px 4px;margin-bottom:2px;font-size:9px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${esc(p.text)}">${esc(p.text)||'Post'}</div>`;}).join('')}
            ${posts.length>3?`<div style="font-size:9px;color:var(--ac);font-weight:700;padding-left:2px;">+${posts.length-3}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

function fmtcls(id){return't-fmt-'+(id||'feed');}
function gfmt(id){return POST_FORMATS.find(f=>f.id===id)||null;}

function updateSubtypes(fmtId){
  // update subtype select
  const sel=document.getElementById('sel-postSubtype');
  const fg=document.getElementById('fg-postSubtype');
  const lbl=document.getElementById('lbl-postSubtype-fmt');
  if(sel){
    sel.innerHTML='<option value="">Selecionar...</option>';
    (POST_SUBTYPES[fmtId]||[]).forEach(s=>{
      const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);
    });
  }
  if(fg)fg.style.display=fmtId?'flex':'none';
  if(lbl)lbl.textContent=fmtId?(gfmt(fmtId)?.label||''):'';
  // update pill active state
  document.querySelectorAll('.fmt-pill').forEach(el=>{
    const inp=el.querySelector('input[type="radio"]');
    if(inp){el.classList.toggle('active',inp.value===fmtId);}
  });
}

// EVENT BINDING
// ═══════════════════════════════════════
function bind(){
  const r=document.getElementById('root');

  // Pipeline tabs
  r.querySelectorAll('[data-pipe]').forEach(b=>b.addEventListener('click',()=>{S.pipe=b.dataset.pipe;render();}));

  // View toggle
  r.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>{
    if(S.pipe==='content')S.view=b.dataset.view;else S.view2=b.dataset.view;render();
  }));

  // New button
  r.querySelectorAll('[data-action="new"]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    if(S.pipe==='content'){
      S.modal={open:true,id:null,defStatus:b.dataset.st||'ideas',tab:'basic'};
    }else{
      S.modal2={open:true,id:null,defStatus:b.dataset.st2||'triage',tab:'form',attachmentName:''};
    }
    render();
  }));

  // Filters P1
  r.querySelectorAll('[data-f1]').forEach(el=>el.addEventListener('input',()=>{S.filters[el.dataset.f1]=el.value;render();}));
  const clr1=r.querySelector('[data-action="clr1"]');
  if(clr1)clr1.addEventListener('click',()=>{S.filters={search:'',project:'',type:'',funnel:'',channel:'',status:'',responsible:''};render();});

  // Filters P2
  r.querySelectorAll('[data-f2]').forEach(el=>el.addEventListener('input',()=>{S.filters2[el.dataset.f2]=el.value;render();}));
  const clr2=r.querySelector('[data-action="clr2"]');
  if(clr2)clr2.addEventListener('click',()=>{S.filters2={search:'',unit:'',orderType:'',status:''};render();});

  // Sort P1

      if(S.confirm.open){_confirmCallback=null;S.confirm={open:false,title:'',message:''};render();}
      else if(S.modal.open){S.modal.open=false;render();}
      else if(S.modal2.open){S.modal2.open=false;render();}
    }
    if(e.key==='n'&&!S.modal.open&&!S.modal2.open&&e.target.tagName!=='INPUT'&&e.target.tagName!=='TEXTAREA'&&e.target.tagName!=='SELECT'){
      if(S.pipe==='content'){S.modal={open:true,id:null,defStatus:'ideas',tab:'basic'};}
      else{S.modal2={open:true,id:null,defStatus:'triage',tab:'form',attachmentName:''};}
      render();
    }
  };
}

function dnd1(r){
  let dragId=null;
  r.querySelectorAll('.card[data-cid]').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragId=el.dataset.cid;el.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');dragId=null;});
  });
  r.querySelectorAll('[data-dz]').forEach(z=>{
    z.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';z.classList.add('dover');});
    z.addEventListener('dragleave',()=>z.classList.remove('dover'));
    z.addEventListener('drop',e=>{
      e.preventDefault();z.classList.remove('dover');
      if(!dragId)return;
      const c=S.cards.find(x=>x.id===dragId);
      if(c&&c.status!==z.dataset.dz){c.status=z.dataset.dz;save1();render();}
    });
  });
}

function dnd2(r){

  r.querySelectorAll('[data-dz2]').forEach(z=>{

  });
}
